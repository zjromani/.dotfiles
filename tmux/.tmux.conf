set -ga terminal-overrides ",xterm-256color*:Tc"
set -ga terminal-overrides "*:Ss=\\E[%p1%d q:Se=\\E[2 q"
set-option -g default-terminal "tmux-256color"
set -s escape-time 0
set-option -g focus-events on
set -g mouse on
set -g history-limit 100000

# Window activity notifications
#setw -g monitor-activity on
#set -g visual-activity on
set -g visual-bell off
set -g bell-action none

# ============================================
# Tokyo Night — manual config (no plugin)
# ============================================
set -g automatic-rename on

# Status bar chrome
set -g status-position      bottom
set -g status-interval      5
set -g status-justify       left
set -g status-style         "bg=#16161e,fg=#c0caf5"
set -g status-left          ""
set -g status-left-length   0
set -g status-right         "#{?pane_in_mode,#[fg=#e0af68,bold]COPY  ,}#[fg=#3d59a1] │ #[fg=#73daca,bold]#S "
set -g status-right-length  60

# Window tabs — active gets blue fill, inactive fades to comment gray
set -g window-status-separator       ""
set -g window-status-style           "fg=#565f89,bg=#16161e,nobold"
set -g window-status-format          " #I  #W "
set -g window-status-current-style   "fg=#1d2230,bg=#7aa2f7,bold"
set -g window-status-current-format  " #I  #W "

# Suppress activity/bell coloring — keep all tabs uniform
setw -g monitor-activity off
set  -g window-status-activity-style "fg=#565f89,bg=#16161e,nobold"
set  -g window-status-bell-style     "fg=#f7768e,bg=#16161e,bold"

# Window naming - show current directory (always meaningful; avoids version-stamped binary names like 1.2.1.50)
set -g automatic-rename-format '#{b:pane_current_path}'
set -g allow-rename off  # prevent programs from overriding automatic names

# source my tmuxrc easily
bind r source-file ~/.tmux.conf

# vim like pane splits
unbind '"'
unbind %
unbind s
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# don' start windows at zero
set -g base-index 1
set-option -g renumber-windows on

# vim-like pane switching
bind -r ^ last-window
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

# iterm like clear (only with ctrl instead of command)
bind -n C-k send-keys -R \; send-keys C-l \; clear-history

# copy things in tmux visual mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe 'pbcopy -in -selection clipboard' \; send-keys -X clear-selection


# Copy last 50 lines of pane output to clipboard
bind Y run-shell "tmux capture-pane -p -S -50 | pbcopy && tmux display-message 'Last 50 lines copied!'"

# Active pane border: bright blue. Inactive: very dark so active pops.
set -g pane-border-style        'fg=#2A2F41'
set -g pane-active-border-style 'fg=#7aa2f7,bold'

# Copy mode: selection highlight — blue bg, dark text
setw -g mode-style    "fg=#1a1b26,bg=#7aa2f7,bold"
set  -g message-style "fg=#c0caf5,bg=#1a1b26"

# Copy mode: active border turns orange (visible when splits exist)
set-hook -g pane-mode-changed 'if -F "#{pane_in_mode}" "set-option -g pane-active-border-style fg=#e0af68,bold" "set-option -g pane-active-border-style fg=#7aa2f7,bold"'

# vim-like navigation in copy mode (mirrors nvim remap.lua)
bind -T copy-mode-vi H send-keys -X back-to-indentation
bind -T copy-mode-vi L send-keys -X end-of-line
bind -T copy-mode-vi Space send-keys -X select-word

# Session/branch switching - works even inside Claude Code
bind-key -n C-f run-shell "tmux neww ~/.dotfiles/bin/scripts/tmux-sessionizer"
# bind-key -n C-g run-shell "tmux neww git-branch-switch"

# ============================================
# Claude Code Workflow
# ============================================

# Spawn a Claude Code window in current project path
bind C new-window -c "#{pane_current_path}" \; rename-window "claude" \; send-keys "claude" Enter

# 3-pane Claude layout: large left (editor), right-top (claude), right-bottom (tests)
bind e split-window -h -c "#{pane_current_path}" \; split-window -v -c "#{pane_current_path}" \; select-pane -L \; send-keys "claude" Enter

# 2-pane Claude split: Claude top (80%), shell bottom (20%)
bind E send-keys "claude" Enter \; split-window -v -p 20 -c "#{pane_current_path}"

# Rename Claude session: prompts for name, renames tmux window, copies to clipboard, sends /rename to Claude
bind R command-prompt -p "Session name:" "rename-window '%1' ; run-shell 'printf \"%1\" | pbcopy' ; send-keys '/rename %1' Enter"

# Copy current window name to system clipboard
bind C-c run-shell "tmux display-message -p '#W' | pbcopy ; tmux display-message 'Window name copied!'"

# Markdown preview: send :MarkdownPreview, snap iTerm2 left + Chrome right (markdown files only)
bind M run-shell "markdown-preview #{pane_id}"

# Weekly scratch pad: open ~/flights/scratch-pad/YYYY-Wnn.md in dedicated notes session
bind N run-shell "notes-scratch"
