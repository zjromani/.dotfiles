set -ga terminal-overrides ",xterm-256color*:Tc"
set-option -g default-terminal "tmux-256color"
set -s escape-time 0
set-option -g focus-events on
set -g mouse on

# Window activity notifications
#setw -g monitor-activity on
#set -g visual-activity on
set -g visual-bell off
set -g bell-action none

# ============================================
# Catppuccin Theme
# ============================================
set -g @catppuccin_flavor "mocha"  # dark theme (or: latte, frappe, macchiato)
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_width "20"
set -g automatic-rename on

# Load catppuccin (must come before status-right config)
run ~/.config/tmux/plugins/catppuccin/catppuccin.tmux

# Status bar - minimal setup
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -g status-right-length 100

# Window naming - show current directory (always meaningful; avoids version-stamped binary names like 1.2.1.50)
set -g automatic-rename-format '#{b:pane_current_path}'
set -g allow-rename off  # prevent programs from overriding automatic names

# source my tmuxrc easily
bind r source-file ~/.tmux.conf

# vim like pane splits
unbind '"'
unbind %
unbind s
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# don' start windows at zero
set -g base-index 1
set-option -g renumber-windows on

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# iterm like clear (only with ctrl instead of command)
bind -n C-k send-keys -R \; send-keys C-l \; clear-history

# copy things in tmux visual mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy -in -selection clipboard'

# vim-like navigation in copy mode (mirrors nvim remap.lua)
bind -T copy-mode-vi H send-keys -X back-to-indentation
bind -T copy-mode-vi L send-keys -X end-of-line
bind -T copy-mode-vi Space send-keys -X select-word

# Session/branch switching - works even inside Claude Code
bind-key -n C-f run-shell "tmux neww tmux-sessionizer"
# bind-key -n C-g run-shell "tmux neww git-branch-switch"

# ============================================
# Claude Code Workflow
# ============================================

# Spawn a Claude Code window in current project path
bind C new-window -c "#{pane_current_path}" \; rename-window "claude" \; send-keys "claude" Enter

# 3-pane Claude layout: large left (editor), right-top (claude), right-bottom (tests)
bind e split-window -h -c "#{pane_current_path}" \; split-window -v -c "#{pane_current_path}" \; select-pane -L \; send-keys "claude" Enter

# 2-pane Claude split: Claude left (2/3), shell right (1/3)
bind E split-window -h -p 33 -c "#{pane_current_path}" \; select-pane -L \; send-keys "claude" Enter

# Rename Claude session: prompts for name, renames tmux window, copies to clipboard, sends /rename to Claude
bind R command-prompt -p "Session name:" "rename-window '%1' ; run-shell 'printf \"%1\" | pbcopy' ; send-keys '/rename %1' Enter"

# Markdown preview: send :MarkdownPreview, snap iTerm2 left + Chrome right
bind m run-shell "markdown-preview #{pane_id}"

# Weekly scratch pad: open ~/flights/scratch-pad/YYYY-Wnn.md in dedicated notes session
bind N run-shell "notes-scratch"
